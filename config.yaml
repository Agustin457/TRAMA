# Configuración del Pipeline ETL

pipeline:
  name: "etl_automation"
  version: "1.0.0"
  log_level: "INFO"

paths:
  raw_data_dir: "data/raw"
  processed_data_dir: "data/processed"
  output_dir: "data/output"
  master_output_name: "productos_master"
  db_path: "data/etl_database.db"
  woocommerce_csv_path: "data/raw/woocommerce_products.csv"


# Configuración de extracción
extraction:
  api_endpoint: "https://api.example.com/v1/data"
  timeout: 30
  providers:
    ale:
      filename: "Lista de Precios ALE Actualizada (49).xlsx"
      sheet: "LISTA DE PRECIOS"
      header_row: 2
    powerland:
      filename: "ListadePrecios (53).xlsx"
      sheet: "Lista de precios de productos"
      header_row: 5
    rotring:
      filename: "LISTA Nº 1 - 26 LINEA ROTRING.xlsx"
      sheet: "Hoja1"
      header_row: 17


# Configuración de impuestos de Argentina (Cascada Impositiva)
taxes:
  iva: 0.21         # Alícuota general de IVA (21%)
  iibb: 0.035       # Percepción de Ingresos Brutos (3.5%)
  cheque: 0.012     # Impuesto a los débitos y créditos bancarios (1.2%)
  sellos: 0.01      # Impuesto a los sellos / Percepción adicional (1.0%)



