# Configuración del Pipeline ETL

pipeline:
  name: "etl_automation"
  version: "1.0.0"
  log_level: "INFO"

paths:
  raw_data_dir: "data/raw"
  processed_data_dir: "data/processed"
  output_dir: "data/output"
  master_output_name: "productos_master"
  db_path: "postgresql://postgres.jqpvrdvvmvovibrtrvjt:5koWH6zpYdpvekrC@aws-1-us-west-2.pooler.supabase.com:5432/postgres"
  woocommerce_csv_path: "data/raw/woocommerce_products.csv"
  images_dir: "data/images"

# Configuración de API WooCommerce
woocommerce:
  url: "https://tramabuenosaires.com.ar"
  consumer_key: "ck_reemplazar_con_tu_key"
  consumer_secret: "cs_reemplazar_con_tu_secret"
  dry_run: true  # Simular los cambios en la consola sin guardarlos en la web

# Configuración de API WordPress (Para biblioteca de medios)
wordpress:
  username: "tu_usuario_administrador"
  application_password: "xxxx xxxx xxxx xxxx"  # Generada en WordPress -> Perfil -> Contraseñas de aplicación




# Configuración de extracción
extraction:
  api_endpoint: "https://api.example.com/v1/data"
  timeout: 30
  providers:
    ale:
      filename: "Lista Ale.xlsx"
      sheet: "LISTA DE PRECIOS"
      header_row: 2
      processed_filename: "Lista Ale_normalizado.xlsx"
      has_iva: true
    powerland:
      filename: "Lista Powerland.xlsx"
      sheet: "Lista de precios de productos"
      header_row: 5
      processed_filename: "Lista Powerland_normalizado.xlsx"
      has_iva: true
    rotring:
      filename: "Lista Plantec*.xlsx"
      sheet: "Hoja1"
      header_row: 17
      processed_filename: "Lista Plantec*_normalizado.xlsx"
      has_iva: false



