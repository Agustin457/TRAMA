# Configuración del Pipeline ETL

pipeline:
  name: "etl_automation"
  version: "1.0.0"
  log_level: "INFO"

paths:
  raw_data_dir: "data/raw"
  processed_data_dir: "data/processed"
  output_dir: "data/output"
  master_output_name: "productos_master"
  db_path: "postgresql://postgres.jqpvrdvvmvovibrtrvjt:[YOUR-PASSWORD]@aws-1-us-west-2.pooler.supabase.com:5432/postgres"
  woocommerce_csv_path: "data/raw/woocommerce_products.csv"


# Configuración de extracción
extraction:
  api_endpoint: "https://api.example.com/v1/data"
  timeout: 30
  providers:
    ale:
      filename: "Lista Ale.xlsx"
      sheet: "LISTA DE PRECIOS"
      header_row: 2
      processed_filename: "Lista Ale_normalizado.xlsx"
      has_iva: true
    powerland:
      filename: "Lista Powerland.xlsx"
      sheet: "Lista de precios de productos"
      header_row: 5
      processed_filename: "Lista Powerland_normalizado.xlsx"
      has_iva: true
    rotring:
      filename: "Lista Plantec*.xlsx"
      sheet: "Hoja1"
      header_row: 17
      processed_filename: "Lista Plantec*_normalizado.xlsx"
      has_iva: false



